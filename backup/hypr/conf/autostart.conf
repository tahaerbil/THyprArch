#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:


exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland #bu kısım sonradan eklendi kontrol et
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP #bu kısım sonradan eklendi kontrol et


exec-once = /usr/lib/polkit-kde-authentication-agent-1 &


# Wallpaper daemon
exec-once = awww-daemon &

# Waybar
exec-once = waybar &

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = swaync &

# Idle daemon (locks and manages sleep)
#exec-once = hypridle &

# Quickshell Overview
#exec-once = quickshell -p overview

# KDE Connect Daemon
exec-once = /usr/lib/kdeconnectd &

# Clipboard Manager (cliphist)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store