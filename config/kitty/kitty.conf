# ╔══════════════════════════════════════════════════════════════════╗
# ║  thyprsc — Kitty Terminal Configuration                        ║
# ║  Theme: Tokyo Night · Minimal · GPU-accelerated                ║
# ╚══════════════════════════════════════════════════════════════════╝


# ── Tipografi ─────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        11.0

# Satır ve karakter aralığı — nefes alan tipografi
adjust_line_height  120%
adjust_column_width 0

# Ligature desteği (JetBrains Mono ligature'lerini aktifleştir)
disable_ligatures never


# ── Pencere ve Düzen ─────────────────────────────────────────────
# İç kenar boşlukları — terminal içeriği kenarlara yapışmasın
window_padding_width 12 16

# Pencere dekorasyonu
hide_window_decorations yes
confirm_os_window_close 0

# Başlangıç boyutu
remember_window_size  no
initial_window_width  120c
initial_window_height 36c

# Pencere düzeni
enabled_layouts tall:bias=62;full_size=1, stack, fat, grid


# ── İmleç ────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15


# ── Fare ─────────────────────────────────────────────────────────
mouse_hide_wait      3.0
url_style            curly
open_url_with        default
copy_on_select       clipboard
strip_trailing_spaces smart

# URL tıklama
detect_urls     yes
url_prefixes    file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh


# ── Performans ───────────────────────────────────────────────────
repaint_delay   6
input_delay     1
sync_to_monitor yes


# ── Ses ──────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab          "🔔 "


# ── Sekme Çubuğu ────────────────────────────────────────────────
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_bar_align       left

tab_title_template        " {fmt.fg.tab}{index}  {title} "
active_tab_title_template " {fmt.fg.tab}{index}  {title} "

active_tab_font_style   bold
inactive_tab_font_style normal


# ── Kaydırma ─────────────────────────────────────────────────────
scrollback_lines         10000
scrollback_pager_history_size 4
wheel_scroll_multiplier  5.0
touch_scroll_multiplier  1.0


# ── Gelişmiş ─────────────────────────────────────────────────────
shell_integration    enabled no-cursor
allow_hyperlinks     yes
term                 xterm-kitty
editor               .


# ── Klavye Kısayolları ───────────────────────────────────────────

# Temizle
clear_all_shortcuts no

# Kopyala / Yapıştır
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font boyutu
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Sekmeler
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward

# Sekme numarasıyla geçiş
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Pencere yönetimi
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+f move_window_forward

# Düzen değiştir
map ctrl+shift+l next_layout

# Kaydırma
map ctrl+shift+up   scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end  scroll_end

# Yeniden yükle
map ctrl+shift+f5 load_config_file

# Unicode giriş
map ctrl+shift+u kitten unicode_input


