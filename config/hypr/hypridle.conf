general {
    lock_cmd = pidof hyprlock || hyprlock       # Eğer hyprlock çalışmıyorsa çalıştır
    before_sleep_cmd = loginctl lock-session    # Bilgisayar uykuya dalmadan (suspend) saniyeler önce ekranı kilitle
    after_sleep_cmd = hyprctl dispatch dpms on  # Uykudan uyanıldığında ekran gücünü (DPMS) hemen geri ver
    
    # Video/Film İzleme Koruması
    ignore_dbus_inhibit = false                 # Tarayıcılar (Zen, Chrome) ve medya oynatıcıların (VLC) uyku engelleme sinyallerini dinle
    ignore_systemd_inhibit = false              # Systemd tabanlı uyku engellemelere saygı duy
}

# 1. Aşama: Parlaklık Kısma (2.5 Dakika)
listener {
    timeout = 150                                # 150 saniye boşta kalırsa
    on-timeout = brightnessctl -s set 10         # Parlaklığı %10'a düşür (Uyarı niteliğinde)
    on-resume = brightnessctl -r                 # Geri dönüldüğünde eski parlaklığı geri yükle
}

# 2. Aşama: Ekranı Kilitleme (5 Dakika)
listener {
    timeout = 300                                # 300 saniye boşta kalırsa
    on-timeout = loginctl lock-session           # Güvenlik için ekranı kilitle (hyprlock tetiklenir)
}

# 3. Aşama: Ekran Gücünü Kesme / DPMS Off (5.5 Dakika)
listener {
    timeout = 330                                # 330 saniye
    on-timeout = hyprctl dispatch dpms off       # Monitöre giden gücü kes (Simsiyah ekran)
    on-resume = hyprctl dispatch dpms on         # Hareket algılandığında gücü geri ver
}

# 4. Aşama: Bilgisayarı Uyutma / Suspend (15 Dakika)
# DİKKAT: Bilgisayarında lokal yapay zeka (LLM) çalıştırdığını belirttiğin için bu kısmı bilerek KAPALI bıraktım.
# Eğer 15 dakika boşta kaldığında PC uykuya geçerse arka plandaki modelin/işlemlerin kapanabilir.
# Sadece ekranı kapatmak RAM ve işlemi bozmaz. Eğer komple uyumasını istersen aşağıdaki '#' işaretlerini silebilirsin.

