###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, ~/.config/hypr/scripts/kill-active.sh
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, SPACE, fullscreen,
bind = $mainMod, B, exec, $browser
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Grouping / Tabbing (Sekmeleme)
bind = $mainMod, G, togglegroup,
#bind = $mainMod, TAB, changegroupactive, f
#bind = $mainMod SHIFT, TAB, changegroupactive, b
binde = $mainMod, TAB, changegroupactive, f
binde = $mainMod SHIFT, TAB, changegroupactive, b
bind = $mainMod ALT, left, moveintogroup, l
bind = $mainMod ALT, right, moveintogroup, r
bind = $mainMod ALT, up, moveoutofgroup, u
bind = $mainMod ALT, down, moveoutofgroup, d

# Swap windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
#bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh all-up
#bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh all-down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot keybindings
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window
bind = $mainMod ALT, Print, exec, ~/.config/hypr/scripts/screenshot.sh menu

# Quickshell Overview (workspace overview toggle)
#bind = $mainMod, TAB, exec, quickshell ipc call overview toggle

# Bildirim Paneli (Swaync)
bind = $mainMod, N, exec, swaync-client -t -sw

# Gece Işığı (Night Light)
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/night-light.sh

# Clipboard History (Pano Geçmişi)
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh

# Ara yüz Teması Değiştirme (Waybar, UI)
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/waybar-theme.sh

# Duvar Kağıdı Değiştirme (Sadece Duvar Kağıdı)
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh

# Güç Menüsü (Power Menu)
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/powermenu.sh

# Hesap Makinesi (rofi-calc)
bind = , XF86Calculator, exec, rofi -show calc -modi calc -no-show-match -no-sort -calc-command "echo -n '{result}' | wl-copy"

# Emoji Seçici (rofimoji)
#bind = $mainMod, period, exec, rofimoji
bind = $mainMod, period, exec, rofimoji --action copy